{% extends "base.html" %}
{% block title %}{{ topic_data.name }} Practice - MathQuest{% endblock %}
{% block body %}
<div class="student-bg">
    <div class="student-nav">
        <a href="/student/dashboard" class="student-nav-logo">🌟 MathQuest</a>
        <a href="/student/dashboard" class="btn btn-sm" style="background:rgba(255,255,255,0.2);color:white;border-radius:40px;font-weight:700;text-decoration:none;padding:8px 16px">← Dashboard</a>
    </div>
    
    <div class="practice-container">
        <div style="text-align:center;color:white;margin-bottom:24px">
            <h1 style="font-size:28px;font-weight:900">{{ topic_data.emoji }} {{ topic_data.name }}</h1>
            <p style="opacity:0.8">Practice makes perfect! 💪</p>
        </div>
        
        <div class="practice-progress">
            <div class="practice-progress-fill" id="progressFill" style="width:0%"></div>
        </div>
        
        <div class="question-card">
            <div class="question-number" id="qNum">Question 1 of 15</div>
            
            <div class="question-text" id="qText">Loading...</div>
            
            <div style="display:flex;gap:12px;justify-content:center;margin-bottom:16px">
                <input type="number" id="answerInput" class="answer-input" placeholder="?" autocomplete="off">
            </div>
            
            <div id="hintBox" class="hint-box" style="display:none"></div>
            <div id="explBox" class="explanation-box" style="display:none"></div>
            
            <div class="answer-buttons">
                <button onclick="showHint()" class="btn btn-yellow btn-sm">💡 Hint</button>
                <button onclick="checkAnswer()" class="btn btn-green">Check ✓</button>
                <button onclick="showExplanation()" class="btn btn-blue btn-sm">📖 Explain</button>
            </div>
        </div>
    </div>
</div>

<script>
const questions = {{ topic_data.questions|tojson }};
let currentQuestion = 0;
let correctCount = 0;

function showQuestion() {
    const q = questions[currentQuestion];
    const total = questions.length;
    const pct = Math.round((currentQuestion / total) * 100);
    
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('qNum').textContent = `Question ${currentQuestion + 1} of ${total}`;
    document.getElementById('qText').textContent = q.question;
    
    const input = document.getElementById('answerInput');
    input.value = '';
    input.className = 'answer-input';
    input.disabled = false;
    input.focus();
    
    document.getElementById('hintBox').style.display = 'none';
    document.getElementById('explBox').style.display = 'none';
}

function showHint() {
    const q = questions[currentQuestion];
    const hintBox = document.getElementById('hintBox');
    hintBox.innerHTML = '💡 <strong>Hint:</strong> ' + q.hint;
    hintBox.style.display = 'block';
}

function showExplanation() {
    const q = questions[currentQuestion];
    const explBox = document.getElementById('explBox');
    explBox.innerHTML = '📖 <strong>How to solve:</strong><br>' + q.explanation;
    explBox.style.display = 'block';
}

function checkAnswer() {
    const input = document.getElementById('answerInput');
    const userAns = parseInt(input.value);
    const q = questions[currentQuestion];
    
    if (isNaN(userAns)) {
        input.classList.add('wrong');
        setTimeout(() => input.classList.remove('wrong'), 400);
        return;
    }
    
    input.disabled = true;
    
    if (userAns === q.answer) {
        input.classList.add('correct');
        correctCount++;
        
        // Confetti!
        for (let i = 0; i < 30; i++) spawnConfetti();
        
        fetch('/api/update_progress', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ topic: '{{ topic }}' })
        });
        
        setTimeout(() => {
            currentQuestion++;
            if (currentQuestion >= questions.length) {
                showComplete();
            } else {
                showQuestion();
            }
        }, 1200);
    } else {
        input.classList.add('wrong');
        setTimeout(() => {
            input.classList.remove('wrong');
            input.value = '';
            input.disabled = false;
            input.focus();
            showHint();
        }, 800);
    }
}

function spawnConfetti() {
    const colors = ['#A78BFA','#34D399','#FBBF24','#F97316','#F472B6','#60A5FA'];
    const piece = document.createElement('div');
    piece.style.cssText = `position:fixed;top:-10px;left:${Math.random()*100}%;width:10px;height:10px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:2px;pointer-events:none;z-index:9999;animation:confettiFall ${1+Math.random()*2}s ease-in forwards`;
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 3000);
}

function showComplete() {
    const pct = Math.round((correctCount / questions.length) * 100);
    document.getElementById('progressFill').style.width = '100%';
    
    fetch('/api/update_progress', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ topic: '{{ topic }}' })
    });
    
    const container = document.querySelector('.practice-container');
    container.innerHTML = `
        <div style="text-align:center;color:white;margin-bottom:24px">
            <h1 style="font-size:28px;font-weight:900">Practice Complete! 🎉</h1>
        </div>
        <div style="background:white;border-radius:24px;padding:48px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.15);animation:popIn 0.6s cubic-bezier(0.34,1.56,0.64,1)">
            <div style="font-size:96px">🎉</div>
            <h2 style="font-size:36px;font-weight:900;color:#7C3AED;margin-bottom:8px">Amazing {{ child_name }}!</h2>
            <p style="font-size:20px;color:#6B7280;margin-bottom:24px">You finished all ${questions.length} questions!</p>
            <div style="font-size:72px;font-weight:900;color:#34D399;margin-bottom:8px">${pct}%</div>
            <p style="font-size:18px;color:#6B7280;margin-bottom:32px">${correctCount} out of ${questions.length} correct answers</p>
            <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap">
                <a href="/student/dashboard" style="padding:16px 32px;border-radius:50px;font-size:18px;font-weight:800;text-decoration:none;display:inline-block;background:#A78BFA;color:white">← Dashboard</a>
                <a href="/quiz/times_tables" style="padding:16px 32px;border-radius:50px;font-size:18px;font-weight:800;text-decoration:none;display:inline-block;background:#34D399;color:white">Take Quiz →</a>
            </div>
        </div>
    `;
    
    for (let i = 0; i < 60; i++) setTimeout(spawnConfetti, i * 30);
}

document.addEventListener('DOMContentLoaded', () => {
    showQuestion();
    document.getElementById('answerInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') checkAnswer();
    });
});

// Confetti animation
const style = document.createElement('style');
style.textContent = `@keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } } @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }`;
document.head.appendChild(style);
</script>
{% endblock %}
