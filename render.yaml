# Render.com Blueprint
# Deploy this with: renderctl deploy --config render.yaml

services:
  - type: web
    name: mathquest
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
