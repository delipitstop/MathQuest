<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Snake</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: #0a0a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Nunito', sans-serif;
            color: white;
            padding: 12px;
        }
        .hud {
            display: flex;
            gap: 24px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .hud-item {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            padding: 6px 18px;
            font-size: 15px;
            font-weight: 700;
        }
        .hud-item span { color: #A78BFA; }
        .feedback {
            font-size: 15px;
            font-weight: 800;
            min-height: 24px;
            margin-bottom: 6px;
            text-align: center;
            transition: opacity 0.3s;
        }
        canvas {
            display: block;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(167,139,250,0.2);
            max-width: 100%;
        }
        /* Question overlay */
        #questionBox {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a0a4e, #2d1b69);
            border: 3px solid #A78BFA;
            border-radius: 20px;
            padding: 24px 32px;
            text-align: center;
            z-index: 100;
            box-shadow: 0 0 60px rgba(167,139,250,0.5);
            min-width: 300px;
        }
        #questionBox h2 {
            margin: 0 0 8px 0;
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #mathQ {
            font-size: 34px;
            font-weight: 900;
            color: #FBBF24;
            margin: 0 0 16px 0;
            text-shadow: 0 0 20px rgba(251,191,36,0.5);
        }
        #mathInput {
            width: 120px;
            padding: 12px;
            font-size: 28px;
            font-weight: 900;
            text-align: center;
            border: 3px solid #A78BFA;
            border-radius: 14px;
            background: rgba(255,255,255,0.08);
            color: white;
            outline: none;
            font-family: 'Nunito', sans-serif;
        }
        #mathInput:focus { border-color: #FBBF24; }
        #submitBtn {
            display: block;
            margin: 14px auto 0;
            padding: 10px 28px;
            background: linear-gradient(135deg, #34D399, #2dd4a8);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
        }
        .hint {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-top: 10px;
        }
        .legend {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 8px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        .legend span { display: flex; align-items: center; gap: 4px; }
        .green-dot { width: 12px; height: 12px; background: #34D399; border-radius: 3px; display: inline-block; }
        .yellow-dot { width: 12px; height: 12px; background: #FBBF24; border-radius: 3px; display: inline-block; }
    </style>
</head>
<body>
    <!-- Question Overlay -->
    <div id="questionBox">
        <h2>Solve to Score!</h2>
        <div id="mathQ">7 + 5 = ?</div>
        <input type="text" id="mathInput" placeholder="?" autocomplete="off">
        <button id="submitBtn" onclick="submitAnswer()">Lock In Answer</button>
        <div class="hint">Press ENTER or click the button</div>
    </div>

    <!-- HUD -->
    <div class="hud">
        <div class="hud-item">Score: <span id="score">0</span></div>
        <div class="hud-item">Lives: <span id="lives">❤️❤️❤️</span></div>
        <div class="hud-item">Level: <span id="level">1</span></div>
    </div>
    <div class="feedback" id="feedback"></div>

    <!-- Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- Legend -->
    <div class="legend">
        <span><span class="green-dot"></span> Correct answer — eat to grow & score!</span>
        <span><span class="yellow-dot"></span> Wrong answers — avoid them!</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
